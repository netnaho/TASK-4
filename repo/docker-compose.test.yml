# Test-environment override for docker-compose.yml.
#
# Raises the login rate limit to accommodate the full run_tests.sh suite, which
# drives all five API test scripts serially from a single host within one
# 60-second window (~26 login requests from the same IP address).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up --build
#   docker compose -f docker-compose.yml -f docker-compose.test.yml down -v
#
# Do NOT use this override in production deployments.
services:
  backend:
    environment:
      RATE_LIMIT_LOGIN_MAX_PER_MINUTE: 60
