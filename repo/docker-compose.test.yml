# Test-environment override for docker-compose.yml.
#
# Raises rate limits to accommodate the full run_tests.sh suite, which drives
# six API test scripts (including the coverage sweep) serially from a single
# test-tools container within one short window.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up --build
#   docker compose -f docker-compose.yml -f docker-compose.test.yml down -v
#
# Do NOT use this override in production deployments.
services:
  backend:
    environment:
      RATE_LIMIT_LOGIN_MAX_PER_MINUTE: 600
      RATE_LIMIT_MAX_PER_MINUTE: 6000
